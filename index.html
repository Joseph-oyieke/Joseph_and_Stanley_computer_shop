<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Joseph & Stanlys Computer Shop</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #f4f6f9; text-align: center; color: #333; }
        header { background: #0b3d91; color: white; padding: 15px; }
        
        .page { display: none; padding: 20px; }
        .active { display: block; }

        .container { width: 320px; margin: 50px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #ccc; }
        
        button { padding: 12px 25px; background: #0b3d91; color: white; border: none; border-radius: 6px; cursor: pointer; }
        button:hover { background: #1a5ad7; }

        .products { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .product { background: white; padding: 15px; width: 250px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .product img { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; }
        .price { color: #0b3d91; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>

<header>
    <h1>Joseph & Stanlys Computer Shop</h1>
</header>

<div id="loginPage" class="page active">
    <div class="container">
        <h2>Login</h2>
        <p style="font-size: 0.8em; color: #666;">(You must sign up first)</p>
        <input type="text" id="loginUser" placeholder="Username">
        <input type="password" id="loginPass" placeholder="Password">
        <button onclick="loginProcedure()">Login</button>
        <p>No account? <a href="#" onclick="showPage('signupPage')">Sign Up</a></p>
    </div>
</div>

<div id="signupPage" class="page">
    <div class="container">
        <h2>Sign Up</h2>
        <input type="text" id="newUser" placeholder="Create Username">
        <input type="password" id="newPass" placeholder="Create Password">
        <button onclick="signupProcedure()">Create Account</button>
        <p>Already have an account? <a href="#" onclick="showPage('loginPage')">Login</a></p>
    </div>
</div>

<div id="welcomePage" class="page">
    <div class="container">
        <h2 id="greet"></h2>
        <button onclick="showPage('storePage')">View Laptops</button>
    </div>
</div>

<div id="storePage" class="page">
    <h2>Available Laptops</h2>
    <div class="products">
        <div class="product">
            <h3>HP EliteBook</h3>
            <img src="https://images.unsplash.com/photo-1589561084283-930aa7b1ce50?q=80&w=500">
            <p class="price">KSh 45,000</p>
            <button onclick="buyingProcedure('HP EliteBook', 45000)">Buy Now</button>
        </div>
        <div class="product">
            <h3>Dell XPS 13</h3>
            <img src="https://images.unsplash.com/photo-1593642632823-8f785ba67e45?q=80&w=500">
            <p class="price">KSh 50,000</p>
            <button onclick="buyingProcedure('Dell XPS 13', 50000)">Buy Now</button>
        </div>
        <div class="product">
            <h3>ASUS ZenBook</h3>
            <img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?q=80&w=500">
            <p class="price">KSh 60,000</p>
            <button onclick="buyingProcedure('ASUS ZenBook', 60000)">Buy Now</button>
        </div>
    </div>
</div>

<script>
    // Variables to store the account created during Signup
    let registeredUser = "";
    let registeredPass = "";
    let isLoggedIn = false;

    function showPage(pageId) {
        let pages = document.querySelectorAll(".page");
        pages.forEach(p => p.classList.remove("active"));
        document.getElementById(pageId).classList.add("active");
    }

    // SIGNUP PROCEDURE: Saves the data to variables
    function signupProcedure() {
        let user = document.getElementById("newUser").value;
        let pass = document.getElementById("newPass").value;

        if (user.trim() === "" || pass.trim() === "") {
            alert("Please fill in both fields to create an account.");
            return;
        }

        registeredUser = user;
        registeredPass = pass;
        alert("Account created successfully for " + user + "! Now please login.");
        showPage('loginPage');
    }

    // LOGIN PROCEDURE: Checks if input matches the Signup variables
    function loginProcedure() {
        let user = document.getElementById("loginUser").value;
        let pass = document.getElementById("loginPass").value;

        // Validation Logic
        if (registeredUser === "") {
            alert("No account found. Please Sign Up first.");
            showPage('signupPage');
        } else if (user === registeredUser && pass === registeredPass) {
            isLoggedIn = true;
            document.getElementById("greet").innerText = "Welcome back, " + user + "!";
            showPage('welcomePage');
        } else {
            alert("Incorrect username or password. Try again.");
        }
    }

    // BUYING PROCEDURE
    function buyingProcedure(name, price) {
        if (!isLoggedIn) {
            alert("Security Error: You must be logged in to purchase.");
            showPage('loginPage');
            return;
        }

        let confirmBuy = confirm("Confirm purchase of " + name + " for KSh " + price.toLocaleString() + "?");
        if (confirmBuy) {
            alert("Thank you! Your " + name + " order is confirmed.");
        }
    }
</script>

</body>
</html>
